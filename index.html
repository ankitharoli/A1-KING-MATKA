<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A1 KING MATKA - A7 Style</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Goldman:wght@700&family=Roboto:wght@400;700&display=swap');
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0a001f, #1a0033, #000);
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(to right, #ffd700, #ff6600, #ffd700);
      color: black;
      padding: 25px 10px;
      font-size: 2.8rem;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.8);
      text-shadow: 0 0 10px gold;
    }
    .byline { text-align: center; color: #ffd700; font-size: 1.4rem; margin: 10px 0; font-weight: bold; }
    .clock { font-size: 2.7rem; color: #00ffaa; text-align: center; margin: 15px 0; font-weight: bold; text-shadow: 0 0 15px #00ffaa; }
    .result-flash {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.97); border: 8px solid gold; padding: 40px 80px;
      font-size: 5.5rem; color: gold; z-index: 9999; border-radius: 30px; animation: flash 0.5s infinite;
    }
    @keyframes flash { 50% { opacity: 0.3; } }
    .container { max-width: 480px; margin: 0 auto; padding: 10px; }
    .card {
      background: linear-gradient(145deg, #1f0033, #2a004d);
      border: 4px solid #ffd700;
      border-radius: 25px;
      padding: 25px;
      margin: 18px 0;
      box-shadow: 0 15px 40px rgba(255,215,0,0.5);
    }
    .timetable {
      background: linear-gradient(#ffd700, #ffcc00);
      color: black;
      padding: 25px;
      border-radius: 22px;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .whatsapp-btn {
      background: #25D366;
      color: white;
      padding: 20px;
      font-size: 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      display: block;
      margin: 30px auto;
      width: 92%;
      font-weight: bold;
      box-shadow: 0 10px 25px rgba(37, 211, 102, 0.6);
    }
    li { padding: 15px 0; border-bottom: 1px solid #ddd; font-size: 1.25rem; font-weight: 500; }
  </style>
</head>
<body>

  <div class="header">A1 KING MATKA 👑</div>
  <p class="byline">Managers: Ankit & Sachin</p>

  <div class="clock" id="clock">00:00:00 PM</div>
  <p id="date" style="text-align:center; color:#bbb;"></p>

  <div class="result-flash" id="result-flash"></div>

  <div class="container">
    <div class="card">
      <h2>NEXT GAME</h2>
      <h1 id="game-name" style="color:#ffd700; font-size:2.4rem;">NIGHT CHAMP</h1>
      <p>Result Time: <strong id="result-time">21:00</strong></p>
      <p>Starts in</p>
      <div id="countdown" style="font-size:3.4rem; color:#ffd700; font-weight:bold;">00 00 00</div>
    </div>

    <div class="timetable">
      <h2 style="text-align:center; margin-bottom:15px;">Manjeet Bhai - Today's Timetable</h2>
      <ul id="timetable-list"></ul>
    </div>

    <a href="https://wa.me/919876543210" class="whatsapp-btn" target="_blank">
      WhatsApp Par Gameplay Karo
    </a>
  </div>

  <script src="script.js"></script>
</body>
</html>
